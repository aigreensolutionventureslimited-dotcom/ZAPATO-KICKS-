<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O & J Enterprise Dynamics | Nigeria News</title>
    <style>
        :root {
            --primary-silver: #c0c0c0;
            --dark-slate: #2c2c2c;
            --accent-gold: #b8860b;
            --bg-color: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: #333;
        }

        header {
            background: linear-gradient(135deg, var(--dark-slate), #000);
            color: white;
            padding: 2rem;
            text-align: center;
            border-bottom: 3px solid var(--primary-silver);
        }

        header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }
        header p { opacity: 0.8; font-size: 0.9rem; }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        #news-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .news-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .news-card:hover { transform: translateY(-5px); }

        .news-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: var(--primary-silver);
        }

        .news-content { padding: 1.5rem; }
        .news-content h3 { margin-top: 0; font-size: 1.2rem; color: var(--dark-slate); }
        .news-content p { font-size: 0.9rem; line-height: 1.6; color: #666; }
        
        .read-more {
            display: inline-block;
            margin-top: 10px;
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: bold;
        }

        .loader { text-align: center; font-size: 1.2rem; padding: 2rem; }
    </style>
</head>
<body>

<header>
    <h1>O & J ENTERPRISE DYNAMICS</h1>
    <p>STRATEGIC INNOVATION | NIGERIA LIVE NEWS</p>
</header>

<div class="container">
    <div id="news-container">
        <div class="loader">Fetching the latest headlines from Nigeria...</div>
    </div>
</div>

<script>
    const apiKey = 'd2239af68fe74125be535ecb45ad0c35';
    // Using the 'top-headlines' endpoint specifically for Nigeria (country=ng)
    const apiUrl = `https://newsapi.org/v2/top-headlines?country=ng&apiKey=${apiKey}`;

    async function fetchNews() {
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();

            if (data.status === "ok") {
                displayNews(data.articles);
            } else {
                document.getElementById('news-container').innerHTML = `<p>Error: ${data.message}</p>`;
            }
        } catch (error) {
            console.error("Error fetching news:", error);
            document.getElementById('news-container').innerHTML = "<p>Unable to load news at this time.</p>";
        }
    }

    function displayNews(articles) {
        const container = document.getElementById('news-container');
        container.innerHTML = ''; // Clear loader

        articles.forEach(article => {
            if (!article.title || article.title === "[Removed]") return;

            const card = document.createElement('div');
            card.className = 'news-card';

            const imageUrl = article.urlToImage || 'https://via.placeholder.com/400x200?text=Nigeria+News';

            card.innerHTML = `
                <img src="${imageUrl}" alt="News Image">
                <div class="news-content">
                    <h3>${article.title}</h3>
                    <p>${article.description || "Click below to read the full story on this developing news item."}</p>
                    <a href="${article.url}" target="_blank" class="read-more">Read Full Story →</a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    fetchNews();
</script>

</body>
</html>
